name: Deploy dashboard til GitHub Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Data pipeline"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  bygg-og-deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer Python-avhengigheter
        run: pip install -r requirements.txt

      - name: Generer situasjonsbilde-JSON
        run: python scripts/generate_cache.py

      - name: Sett opp Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard-aksel/package-lock.json

      - name: Installer npm-avhengigheter
        working-directory: dashboard-aksel
        run: npm ci --legacy-peer-deps

      - name: Bygg Next.js
        working-directory: dashboard-aksel
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Last opp Pages-artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard-aksel/out

      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
