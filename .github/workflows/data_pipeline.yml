name: Data Pipeline

on:
  schedule:
    # Kjøres hver mandag kl. 06:00 UTC
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths:
      - "config/variables.yaml"
      - "config/models.yaml"
      - "src/data/**"
      - "src/models/**"
      - "src/ensemble/**"
      - "src/runner.py"
  workflow_dispatch:  # Tillat manuell kjøring

jobs:
  fetch-data:
    name: Fetch data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline
        run: python -m src.data.pipeline

      - name: Commit new data vintages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/
          if git diff --cached --quiet; then
            echo "No new data – skipping data commit."
          else
            git commit -m "chore: data vintage $(date -u +%Y-%m-%d)"
            git push
          fi

  run-models:
    name: Run models and ensemble
    needs: fetch-data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the same branch as the workflow so fetch-data commits are visible
          # and the correct .gitignore is in effect.
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run model runner
        run: python -m src.runner

      - name: Commit forecast results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/forecasts/
          if git diff --cached --quiet; then
            echo "No new forecasts – skipping forecast commit."
          else
            git commit -m "chore: prognoseresultater $(date -u +%Y-%m-%d)"
            git push
          fi
